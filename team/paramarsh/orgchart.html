<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organization Chart | FINNOVATE</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://db.onlinewebfonts.com/c/e373b099e1b8f8973fec8aac136a4c9f?family=Denton+Bold" rel="stylesheet">
<style>
  :root {
    --green: #009356;
    --green-dark: #007544;
    --green-hero: #0a2818;
    --black: #0d1117;
    --dark: #1a1a1a;
    --grey-700: #4b5563;
    --grey-500: #6b7280;
    --grey-400: #9ca3af;
    --grey-300: #d1d5db;
    --grey-200: #e5e7eb;
    --grey-100: #f9fafb;
    --white: #ffffff;
    --border: #e5e7eb;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --font-display: "Denton Bold", Georgia, serif;
    --font-body: "Manrope", sans-serif;
    --page-w: 1180px;
    --pad-x: 32px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    color: var(--black);
    background: linear-gradient(180deg, #f6fbf8 0%, #ffffff 220px);
    -webkit-font-smoothing: antialiased;
  }

  .page-shell {
    width: min(var(--page-w), calc(100% - 32px));
    margin: 0 auto;
  }

  .hero {
    padding: 56px var(--pad-x) 32px;
  }

  .hero-card {
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    padding: 44px;
    background: linear-gradient(135deg, var(--green-hero) 0%, #103321 60%, #0f2418 100%);
    box-shadow: var(--shadow);
  }

  .hero-card::before {
    content: "ORG";
    position: absolute;
    right: 24px;
    top: -12px;
    font-family: var(--font-display);
    font-size: clamp(84px, 12vw, 160px);
    line-height: 1;
    color: rgba(255,255,255,.04);
    pointer-events: none;
    user-select: none;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 18px;
  }

  .eyebrow span {
    width: 24px;
    height: 1.5px;
    background: var(--green);
    display: inline-block;
  }

  .hero h1 {
    position: relative;
    z-index: 1;
    max-width: 640px;
    font-family: var(--font-display);
    font-size: clamp(38px, 6vw, 64px);
    line-height: 1.02;
    color: var(--white);
    margin-bottom: 16px;
  }

  .hero p {
    position: relative;
    z-index: 1;
    max-width: 680px;
    font-size: 15px;
    line-height: 1.7;
    color: rgba(255,255,255,.72);
  }

  .hero-meta {
    position: relative;
    z-index: 1;
    margin-top: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,.72);
  }

  .section {
    padding: 0 var(--pad-x) 32px;
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: flex-end;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(26px, 4vw, 38px);
    line-height: 1.08;
    color: var(--black);
  }

  .section-sub {
    max-width: 580px;
    font-size: 14px;
    line-height: 1.65;
    color: var(--grey-700);
  }

  .leaders-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
  }

  .person-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    box-shadow: var(--shadow-sm);
  }

  .person-card.leader {
    padding: 22px;
    border-color: rgba(0,147,86,.18);
    box-shadow: var(--shadow);
  }

  .person-card.head {
    background: linear-gradient(180deg, #f8fffb 0%, #ffffff 100%);
    border: 1px solid rgba(0,147,86,.2);
  }

  .person-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .avatar,
  .avatar img {
    width: 62px;
    height: 62px;
    border-radius: 18px;
    flex-shrink: 0;
  }

  .avatar {
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(0,147,86,.16), rgba(0,117,68,.08));
    color: var(--green-dark);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -.02em;
  }

  .avatar img {
    display: block;
    object-fit: cover;
  }

  .person-name {
    font-size: 17px;
    font-weight: 800;
    line-height: 1.2;
    color: var(--black);
  }

  .person-role {
    margin-top: 4px;
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--grey-700);
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 9px;
    border-radius: 999px;
    background: rgba(0,147,86,.08);
    color: var(--green);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .7px;
    text-transform: uppercase;
  }

  .badge.secondary {
    background: var(--grey-100);
    color: var(--grey-700);
  }

  .notes {
    padding: 0 var(--pad-x) 38px;
  }

  .notes-card {
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--white);
    padding: 18px 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--grey-700);
  }

  .notes-card strong { color: var(--black); }

  .departments {
    padding-bottom: 48px;
  }

  .department-card {
    margin-bottom: 18px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .department-top {
    padding: 22px 24px;
    background: linear-gradient(180deg, #fbfdfc 0%, #f7fbf9 100%);
    border-bottom: 1px solid var(--border);
  }

  .department-topline {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: baseline;
  }

  .department-name {
    font-family: var(--font-display);
    font-size: 26px;
    line-height: 1.1;
    color: var(--black);
  }

  .department-count {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--grey-500);
  }

  .department-sub {
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--grey-700);
    max-width: 720px;
  }

  .department-body {
    padding: 24px;
  }

  .head-wrap {
    position: relative;
    max-width: 440px;
    margin: 0 auto 28px;
  }

  .head-wrap::after {
    content: "";
    position: absolute;
    left: 50%;
    top: calc(100% + 8px);
    transform: translateX(-50%);
    width: 1px;
    height: 20px;
    background: var(--grey-300);
  }

  .head-wrap.no-tail::after {
    display: none;
  }

  .hierarchy-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
  }

  .hierarchy-stack::before {
    content: "";
    position: absolute;
    left: 50%;
    top: -18px;
    transform: translateX(-50%);
    width: 1px;
    height: 18px;
    background: var(--grey-300);
  }

  .hierarchy-node {
    position: relative;
    width: min(440px, 100%);
  }

  .hierarchy-node::after {
    content: "";
    position: absolute;
    left: 50%;
    top: calc(100% + 8px);
    transform: translateX(-50%);
    width: 1px;
    height: 18px;
    background: var(--grey-300);
  }

  .hierarchy-node:last-child::after {
    display: none;
  }

  .marketing-card {
    margin-bottom: 18px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .marketing-body {
    padding: 24px;
  }

  .marketing-pill-row {
    display: flex;
    justify-content: center;
    margin-bottom: 18px;
  }

  .marketing-pill {
    display: inline-flex;
    align-items: center;
    padding: 7px 16px;
    border-radius: 999px;
    background: rgba(0,147,86,.1);
    color: var(--green);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .9px;
    text-transform: uppercase;
  }

  .marketing-overall {
    position: relative;
    max-width: 440px;
    margin: 0 auto 34px;
  }

  .marketing-overall::after {
    content: "";
    position: absolute;
    left: 50%;
    top: calc(100% + 8px);
    transform: translateX(-50%);
    width: 1px;
    height: 20px;
    background: var(--grey-300);
  }

  .marketing-branches {
    position: relative;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    padding-top: 26px;
  }

  .marketing-branches::before {
    content: "";
    position: absolute;
    left: 16%;
    right: 16%;
    top: 0;
    height: 1px;
    background: var(--grey-300);
  }

  .marketing-branches::after {
    content: "";
    position: absolute;
    left: 50%;
    top: -20px;
    transform: translateX(-50%);
    width: 1px;
    height: 20px;
    background: var(--grey-300);
  }

  .marketing-branch {
    position: relative;
    padding-top: 26px;
  }

  .marketing-branch::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 1px;
    height: 26px;
    background: var(--grey-300);
  }

  .branch-label {
    text-align: center;
    margin-bottom: 14px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: var(--grey-500);
  }

  .branch-head {
    max-width: 360px;
    margin: 0 auto 16px;
  }

  .branch-members {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .members-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    position: relative;
    padding-top: 18px;
  }

  .members-grid > .person-card,
  .members-grid > .dept-empty {
    flex: 0 1 calc((100% - 42px) / 4);
    max-width: calc((100% - 42px) / 4);
  }

  .members-grid.has-parent-line {
    padding-top: 28px;
  }

  .members-grid.has-parent-line::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 1px;
    height: 28px;
    background: var(--grey-300);
  }

  .members-grid::before {
    content: "";
    position: absolute;
    left: max(24px, 8%);
    right: max(24px, 8%);
    top: 0;
    height: 1px;
    background: var(--grey-300);
  }

  .members-grid.empty::before {
    display: none;
  }

  .members-grid.two-up > .person-card,
  .members-grid.two-up > .dept-empty {
    flex-basis: calc((100% - 14px) / 2);
    max-width: calc((100% - 14px) / 2);
  }

  .members-grid.no-line {
    padding-top: 0;
    margin-top: 14px;
  }

  .members-grid.no-line::before,
  .members-grid.no-line::after {
    display: none;
  }

  .dept-empty {
    text-align: center;
    padding: 18px;
    border: 1px dashed var(--border);
    border-radius: 14px;
    color: var(--grey-500);
    font-size: 13px;
    background: var(--grey-100);
  }

  .footer {
    padding: 0 var(--pad-x) 48px;
  }

  .footer-text {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--grey-500);
  }

  @media (max-width: 1080px) {
    .leaders-grid,
    .members-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .members-grid > .person-card,
    .members-grid > .dept-empty {
      flex-basis: calc((100% - 28px) / 3);
      max-width: calc((100% - 28px) / 3);
    }
  }

  @media (max-width: 840px) {
    .hero,
    .section,
    .notes,
    .footer {
      padding-left: 18px;
      padding-right: 18px;
    }

    .hero-card {
      padding: 28px 24px;
      border-radius: 20px;
    }

    .section-head,
    .department-topline {
      display: block;
    }

    .leaders-grid,
    .members-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .members-grid > .person-card,
    .members-grid > .dept-empty {
      flex-basis: calc((100% - 14px) / 2);
      max-width: calc((100% - 14px) / 2);
    }

    .department-body {
      padding: 18px;
    }

    .marketing-branches {
      grid-template-columns: 1fr;
    }

    .marketing-branches::before,
    .marketing-branches::after,
    .marketing-overall::after,
    .marketing-branch::before {
      display: none;
    }

    .marketing-branch {
      padding-top: 0;
    }
  }

  @media (max-width: 560px) {
    .leaders-grid,
    .members-grid {
      grid-template-columns: 1fr;
    }

    .members-grid > .person-card,
    .members-grid > .dept-empty {
      flex-basis: 100%;
      max-width: 100%;
    }

    .hero {
      padding-top: 24px;
    }

    .department-name {
      font-size: 22px;
    }
  }

  @media print {
    body {
      background: #fff;
    }

    .hero,
    .section,
    .notes,
    .footer {
      padding-left: 0;
      padding-right: 0;
    }

    .hero-card,
    .department-card,
    .person-card,
    .notes-card {
      box-shadow: none;
    }

    .department-card,
    .person-card {
      break-inside: avoid;
    }
  }
</style>
</head>

  function normalizePhotoKey(value) {
    return value.toLowerCase().replace(/[^a-z0-9]/g, "");
  }

  function resolvePhotoInput(value) {
    if (!value) return "";
    if (/^https?:\/\//i.test(value)) return value;
    return `${TEAM_PICTURES_BASE}/${value}`;
  }

  function getPhotoUrl(name) {
    const explicit = photoMap[name];
    if (explicit) {
      return resolvePhotoInput(explicit);
    }

    const parts = name.split(/\s+/).filter(Boolean);
    const first = parts[0] || "";
    const last = parts[parts.length - 1] || "";
    const firstNorm = normalizePhotoKey(first);
    const lastNorm = normalizePhotoKey(last);
    const fullNorm = normalizePhotoKey(name);
    const stemMatches = TEAM_PICTURE_FILES.find((file) => {
      const stem = normalizePhotoKey(file.replace(/\.[^.]+$/, ""));
      return (
        stem === fullNorm ||
        stem === `${firstNorm}${lastNorm}` ||
        stem === `${firstNorm}${lastNorm.slice(0, 1)}` ||
        stem.startsWith(`${firstNorm}${lastNorm.slice(0, 1)}`) ||
        stem.startsWith(firstNorm) && lastNorm && stem.includes(lastNorm.slice(0, 1))
      );
    });

    return stemMatches ? `${TEAM_PICTURES_BASE}/${stemMatches}` : "";
  }

    const name = person.name || fullName(person);
    const displayName = person.displayName || name;

    const classes = ["person-card"];

    if (options.isLeader) classes.push("leader");
    if (options.isHead) classes.push("head");

    const badges = [];
    if (options.badge) badges.push(`<span class="badge">${options.badge}</span>`);

    return `

        <div class="person-top">
          ${renderAvatar(name, photo)}

            <div class="person-role">${role}</div>
          </div>

  function renderDepartments() {
    const root = document.getElementById("departments");

    root.innerHTML = departmentOrder.map((department) => {
      if (department === "Marketing") {
        return renderMarketingSection();
      }
      const departmentLabel = departmentDisplayNames[department] || department;
      const roster = employees.filter(person => person.department === department);
      const showHead = !departmentsWithoutHead.has(department);
      const reportLead = departmentReportLeads[department];
      const headName = departmentHeads[department];
      const hierarchyNames = departmentHierarchy[department] || [];
      const head = roster.find(person => fullName(person) === headName) || {
        firstName: headName || "TBD",
        lastName: "",
        designation: "Department Head"
      };
      const hierarchyPeople = showHead ? hierarchyNames
        .map(name => roster.find(person => fullName(person) === name))
        .filter(Boolean) : [];
      const members = showHead ? roster.filter(person => {
        const name = fullName(person);
        return name !== headName && !hierarchyNames.includes(name);
      }) : roster;
      const isHrDepartment = department === "HR";
      const hrTopMembers = isHrDepartment ? members.slice(0, 2) : [];
      const hrBottomMembers = isHrDepartment ? members.slice(2) : [];
      const headWrapClass = hierarchyPeople.length ? "head-wrap no-tail" : "head-wrap";
      const hierarchyMarkup = hierarchyPeople.length
        ? `<div class="hierarchy-stack">${hierarchyPeople.map((person, index) => `
            <div class="hierarchy-node">
              ${personCard(person, {
                isHead: true,
                badge: index === 0 ? "Reports To Head" : "Reports To " + fullName(hierarchyPeople[index - 1]),
                department: department === "HR" && fullName(person) === "Neha Sanghrajka" ? "Accounts" : departmentLabel
              })}
            </div>
          `).join("")}</div>`
        : "";
      const reportLeadMarkup = reportLead
        ? `<div class="head-wrap">
              ${personCard(reportLead, { isHead: true, badge: "Heads", department: departmentLabel })}
            </div>`
        : "";
      const membersMarkup = isHrDepartment
        ? `
            <div class="members-grid two-up ${hierarchyPeople.length ? "has-parent-line" : ""}">
              ${hrTopMembers.map(member => personCard(member)).join("")}
            </div>
            ${
              hrBottomMembers.length
                ? `<div class="members-grid no-line">${hrBottomMembers.map(member => personCard(member)).join("")}</div>`
                : ``
            }
          `
        : (
          members.length
            ? `<div class="members-grid ${hierarchyPeople.length ? "has-parent-line" : ""}">${members.map(member => personCard(member)).join("")}</div>`
            : `<div class="members-grid empty"><div class="dept-empty">No additional team members mapped yet.</div></div>`
        );

      return `
        <section class="department-card">
          <div class="department-top">
            <div class="department-topline">
              <h3 class="department-name">${departmentLabel}</h3>
              <div class="department-count">${roster.length} team members</div>
            </div>
            <p class="department-sub">${departmentDescriptions[department] || ""}</p>

            </div>` : ""}
